server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://ip-vps:port/loki/api/v1/push
    batchwait: 5s

scrape_configs:
- job_name: server_job
  static_configs:
  - targets:
    - localhost
    labels:
      job: hw_auto
      __path__: /var/server/log/server/*.log
