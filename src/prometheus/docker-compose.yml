networks:
  monitoring_network:
    external: true
  default:
    driver: bridge

services:
  server:
    container_name: server
    build: ./server
    ports:
      - 5050:5050
    env_file:
      - .env
    volumes:
      - ./server:/app
      - logs-data:/app/logs
      - full-logs-data:/app/full_logs
    networks:
      - default
      - monitoring_network
    restart: unless-stopped

  nginx:
    container_name: nginx
    image: nginx:alpine
    ports:
      - 80:80
      - 443:443
      - 5000:5000
      - 8080:8080
    volumes:
      - ./nginx/${NGINX_CONF_FILENAME}.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
      - ./nginx/data:/srv
    environment:
      - TZ=GMT
      - LE_EMAIL=${EMAIL} # тут свой mail
      - LE_FQDN=${FQDN} # тут домен
      - LETSENCRYPT=true
    depends_on:
      - server
    networks:
      - default
      - monitoring_network
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.0
    volumes:
      - /var/log:/var/log
      - logs-data:/var/server/log/hw_auto/
      - ${PROMTAIL_CONFIG_PATH}:/etc/promtail/config.yml
    env_file: .env
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring_network
    restart: unless-stopped

  prometheus:
    container_name: prometheus
    hostname: prometheus
    image: prom/prometheus
    volumes:
      - ./federated_client.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    restart: always
    networks:
      - monitoring_network
    ports:
      - 9090:9090

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring_network

volumes:
  shared-data:
  logs-data:
  full-logs-data:
  prometheus_data: